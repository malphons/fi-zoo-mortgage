<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="oasGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e2cbff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2cbff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="optGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="nomGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d29922" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d29922" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="140" rx="12" fill="url(#bgGrad)"/>
  <rect width="200" height="140" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Grid lines -->
  <line x1="20" y1="20" x2="180" y2="20" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="38" x2="180" y2="38" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="56" x2="180" y2="56" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="74" x2="180" y2="74" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="92" x2="180" y2="92" stroke="#21262d" stroke-width="0.5"/>

  <!-- Baseline -->
  <line x1="20" y1="100" x2="180" y2="100" stroke="#30363d" stroke-width="1"/>

  <!-- Bar 1: Nominal Spread (yellow, tallest) -->
  <rect x="30" y="28" width="36" height="72" rx="4" fill="url(#nomGrad)"/>
  <text x="48" y="68" font-family="sans-serif" font-size="7.5" fill="#0d1117" text-anchor="middle" font-weight="700">180</text>
  <text x="48" y="78" font-family="sans-serif" font-size="5.5" fill="#0d1117" text-anchor="middle" opacity="0.7">bp</text>

  <!-- Bar 2: Z-Spread (blue, medium) -->
  <rect x="82" y="34" width="36" height="66" rx="4" fill="url(#zGrad)"/>
  <text x="100" y="68" font-family="sans-serif" font-size="7.5" fill="#0d1117" text-anchor="middle" font-weight="700">165</text>
  <text x="100" y="78" font-family="sans-serif" font-size="5.5" fill="#0d1117" text-anchor="middle" opacity="0.7">bp</text>

  <!-- Bar 3: OAS + Option Cost (stacked) -->
  <!-- OAS portion (purple) -->
  <rect x="134" y="46" width="36" height="54" rx="0" fill="url(#oasGrad)"/>
  <rect x="134" y="46" width="36" height="54" rx="4" fill="none"/>
  <!-- Option cost portion (red, on top) -->
  <rect x="134" y="28" width="36" height="18" rx="4" fill="url(#optGrad)"/>
  <!-- Bottom round corners for OAS -->
  <rect x="134" y="46" width="36" height="54" rx="4" fill="url(#oasGrad)"/>
  <rect x="134" y="28" width="36" height="22" rx="4" fill="url(#optGrad)"/>

  <!-- Labels on stacked bar -->
  <text x="152" y="42" font-family="sans-serif" font-size="6" fill="#0d1117" text-anchor="middle" font-weight="700">45</text>
  <text x="152" y="76" font-family="sans-serif" font-size="7.5" fill="#0d1117" text-anchor="middle" font-weight="700">120</text>
  <text x="152" y="86" font-family="sans-serif" font-size="5.5" fill="#0d1117" text-anchor="middle" opacity="0.7">OAS</text>

  <!-- Bracket for option cost -->
  <line x1="172" y1="28" x2="176" y2="28" stroke="#f85149" stroke-width="0.8"/>
  <line x1="176" y1="28" x2="176" y2="46" stroke="#f85149" stroke-width="0.8"/>
  <line x1="172" y1="46" x2="176" y2="46" stroke="#f85149" stroke-width="0.8"/>
  <text x="180" y="40" font-family="sans-serif" font-size="5.5" fill="#f85149" font-weight="600">Opt</text>

  <!-- X-axis labels -->
  <text x="48" y="112" font-family="sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">Nominal</text>
  <text x="100" y="112" font-family="sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">Z-Spread</text>
  <text x="152" y="112" font-family="sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">OAS+Opt</text>

  <!-- Animated glow on OAS bar -->
  <rect x="134" y="46" width="36" height="54" rx="4" fill="#e2cbff" opacity="0.1">
    <animate attributeName="opacity" values="0.05;0.18;0.05" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="100" y="131" font-family="sans-serif" font-size="7.5" fill="#484f58" text-anchor="middle" font-weight="600">Spread Decomposition</text>
</svg>
