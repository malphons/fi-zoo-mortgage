<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="schedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="prepayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="intGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="140" rx="12" fill="url(#bgGrad)"/>
  <rect width="200" height="140" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Grid lines -->
  <line x1="20" y1="30" x2="185" y2="30" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="55" x2="185" y2="55" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="80" x2="185" y2="80" stroke="#21262d" stroke-width="0.5"/>
  <line x1="20" y1="105" x2="185" y2="105" stroke="#21262d" stroke-width="0.5"/>

  <!-- Cash flow waterfall bars: interest (blue) + scheduled principal (green) + prepayment (purple) -->
  <!-- Bar 1 -->
  <rect x="24" y="28" width="11" height="22" rx="2" fill="url(#intGrad)"/>
  <rect x="24" y="50" width="11" height="15" rx="0" fill="url(#schedGrad)"/>
  <rect x="24" y="65" width="11" height="40" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 2 -->
  <rect x="40" y="32" width="11" height="20" rx="2" fill="url(#intGrad)"/>
  <rect x="40" y="52" width="11" height="16" rx="0" fill="url(#schedGrad)"/>
  <rect x="40" y="68" width="11" height="37" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 3 -->
  <rect x="56" y="36" width="11" height="18" rx="2" fill="url(#intGrad)"/>
  <rect x="56" y="54" width="11" height="17" rx="0" fill="url(#schedGrad)"/>
  <rect x="56" y="71" width="11" height="34" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 4 -->
  <rect x="72" y="40" width="11" height="16" rx="2" fill="url(#intGrad)"/>
  <rect x="72" y="56" width="11" height="18" rx="0" fill="url(#schedGrad)"/>
  <rect x="72" y="74" width="11" height="31" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 5 -->
  <rect x="88" y="44" width="11" height="14" rx="2" fill="url(#intGrad)"/>
  <rect x="88" y="58" width="11" height="19" rx="0" fill="url(#schedGrad)"/>
  <rect x="88" y="77" width="11" height="28" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 6 -->
  <rect x="104" y="48" width="11" height="12" rx="2" fill="url(#intGrad)"/>
  <rect x="104" y="60" width="11" height="20" rx="0" fill="url(#schedGrad)"/>
  <rect x="104" y="80" width="11" height="25" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 7 -->
  <rect x="120" y="52" width="11" height="10" rx="2" fill="url(#intGrad)"/>
  <rect x="120" y="62" width="11" height="21" rx="0" fill="url(#schedGrad)"/>
  <rect x="120" y="83" width="11" height="22" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 8 -->
  <rect x="136" y="58" width="11" height="7" rx="2" fill="url(#intGrad)"/>
  <rect x="136" y="65" width="11" height="22" rx="0" fill="url(#schedGrad)"/>
  <rect x="136" y="87" width="11" height="18" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 9 -->
  <rect x="152" y="64" width="11" height="5" rx="2" fill="url(#intGrad)"/>
  <rect x="152" y="69" width="11" height="22" rx="0" fill="url(#schedGrad)"/>
  <rect x="152" y="91" width="11" height="14" rx="0" fill="url(#prepayGrad)"/>

  <!-- Bar 10 -->
  <rect x="168" y="70" width="11" height="3" rx="2" fill="url(#intGrad)"/>
  <rect x="168" y="73" width="11" height="22" rx="0" fill="url(#schedGrad)"/>
  <rect x="168" y="95" width="11" height="10" rx="0" fill="url(#prepayGrad)"/>

  <!-- Baseline -->
  <line x1="20" y1="105" x2="185" y2="105" stroke="#30363d" stroke-width="1"/>

  <!-- Animated shimmer overlay on prepayment bars -->
  <rect x="24" y="65" width="11" height="40" rx="0" fill="#d2a8ff" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="40" y="68" width="11" height="37" rx="0" fill="#d2a8ff" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="56" y="71" width="11" height="34" rx="0" fill="#d2a8ff" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Legend dots -->
  <circle cx="28" cy="118" r="3" fill="#58a6ff"/>
  <text x="34" y="121" font-family="sans-serif" font-size="7" fill="#8b949e">Int</text>
  <circle cx="56" cy="118" r="3" fill="#3fb950"/>
  <text x="62" y="121" font-family="sans-serif" font-size="7" fill="#8b949e">Sched</text>
  <circle cx="90" cy="118" r="3" fill="#d2a8ff"/>
  <text x="96" y="121" font-family="sans-serif" font-size="7" fill="#8b949e">Prepay</text>

  <!-- Title -->
  <text x="100" y="133" font-family="sans-serif" font-size="7.5" fill="#484f58" text-anchor="middle" font-weight="600">CPR Cash Flow Waterfall</text>
</svg>
